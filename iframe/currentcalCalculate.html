<!doctype html>
<html lang="zh">
	<head>
		<meta charset="UTF-8" />
		<title>PCB 线宽与电流计算器</title>
		<style>
			* {
				box-sizing: border-box;
			}

			body {
				font-family: 'Segoe UI', sans-serif;
				background-color: #eef2f7;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				margin: 0;
			}

			.container {
				background-color: #fff;
				padding: 25px 30px;
				border: 1px solid #ccc;
				border-radius: 8px;
				width: 460px;
				box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
				position: relative;
			}

			h2 {
				text-align: center;
				margin-bottom: 20px;
				font-size: 20px;
			}

			.mode-switch {
				display: flex;
				justify-content: center;
				margin-bottom: 15px;
				gap: 10px;
			}

			.mode-switch button {
				padding: 6px 18px;
				font-size: 13px;
				font-weight: 600;
				border: 2px solid #007bff;
				border-radius: 6px;
				cursor: pointer;
				background-color: #fff;
				color: #007bff;
				transition: all 0.2s;
			}

			.mode-switch button.active {
				background-color: #007bff;
				color: #fff;
			}

			.field-group {
				display: flex;
				align-items: center;
				width: 100%;
				margin-bottom: 10px;
			}

			.field-group label {
				width: 130px;
				font-weight: 500;
				font-size: 14px;
			}

			.field-group input {
				flex: 1;
				padding: 5px 8px;
				border: 1px solid #ccc;
				border-radius: 6px;
				font-size: 14px;
				outline: none;
			}

			.field-group select {
				padding: 5px 6px;
				border: 1px solid #ccc;
				border-radius: 6px;
				font-size: 13px;
				outline: none;
				margin-left: 6px;
				cursor: pointer;
			}

			.formula {
				display: none;
				text-align: center;
				margin: 20px 0;
				font-weight: bold;
				font-size: 14px;
				line-height: 1.5;
			}

			.show-formula-button {
				background-color: #007bff;
				color: white;
				border: none;
				border-radius: 6px;
				padding: 6px 16px;
				font-size: 14px;
				font-weight: 600;
				cursor: pointer;
				margin-bottom: 10px;
				display: block;
				margin-left: auto;
				margin-right: auto;
			}

			.result {
				text-align: center;
				font-size: 14px;
				color: #333;
				margin-top: 10px;
				line-height: 1.8;
			}

			.buttons {
				margin-top: 20px;
				display: flex;
				justify-content: flex-end;
			}

			button {
				padding: 6px 16px;
				font-size: 14px;
				font-weight: 600;
				color: white;
				background-color: #007bff;
				border: none;
				border-radius: 6px;
				margin-left: 10px;
				cursor: pointer;
			}

			button.clear {
				background-color: #6c757d;
			}

			button:hover {
				opacity: 0.9;
			}

			.note {
				text-align: center;
				font-size: 11px;
				color: #999;
				margin-top: 8px;
			}

			/* 深色模式 */
			@media (prefers-color-scheme: dark) {
				body {
					background-color: #1a1a1a;
					color: #e0e0e0;
				}

				.container {
					background-color: #2d2d2d;
					border: 1px solid #555;
					box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
				}

				h2 {
					color: #4db8ff;
				}

				.field-group label {
					color: #4db8ff;
				}

				.field-group input {
					background-color: #3a3a3a;
					color: #e0e0e0;
					border: 1px solid #555;
				}

				.field-group select {
					background-color: #3a3a3a;
					color: #e0e0e0;
					border: 1px solid #555;
				}

				.field-group input::placeholder {
					color: #888;
				}

				.formula {
					color: #4db8ff;
				}

				.result {
					color: #e0e0e0;
				}

				.note {
					color: #777;
				}

				button {
					background-color: #0d6efd;
				}

				button:hover {
					background-color: #0a58ca;
				}

				button.clear {
					background-color: #dc3545;
				}

				button.clear:hover {
					background-color: #bb2d3b;
				}

				.show-formula-button {
					background-color: #0d6efd;
				}

				.mode-switch button {
					background-color: #2d2d2d;
					color: #4db8ff;
					border-color: #4db8ff;
				}

				.mode-switch button.active {
					background-color: #4db8ff;
					color: #1a1a1a;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<button class="show-formula-button" id="toggleFormulaButton" type="button">显示公式</button>

			<div class="formula">
				IPC-2221 标准公式：<br />
				I = k × ΔT<sup>0.44</sup> × A<sup>0.725</sup><br />
				A = W × t × 1.378 (mil² → 截面积)<br />
				内层 k = 0.024，外层 k = 0.048
			</div>

			<div class="mode-switch">
				<button id="modeCurrentToWidth" class="active" onclick="switchMode('currentToWidth')">电流 → 线宽</button>
				<button id="modeWidthToCurrent" onclick="switchMode('widthToCurrent')">线宽 → 电流</button>
			</div>

			<!-- 电流→线宽模式 -->
			<div id="currentToWidthFields">
				<div class="field-group">
					<label for="current">电流 (A):</label>
					<input type="number" id="current" placeholder="输入电流" min="0" step="0.1" />
				</div>
			</div>

			<!-- 线宽→电流模式 -->
			<div id="widthToCurrentFields" style="display: none">
				<div class="field-group">
					<label for="traceWidth">线宽:</label>
					<input type="number" id="traceWidth" placeholder="输入线宽" min="0" step="0.1" />
					<select id="widthUnit" onchange="onWidthUnitChange()">
						<option value="mil">mil</option>
						<option value="mm">mm</option>
					</select>
				</div>
			</div>

			<!-- 公共参数 -->
			<div class="field-group">
				<label for="temperature">温升 (℃):</label>
				<input type="number" id="temperature" placeholder="输入温升" min="0" step="1" value="10" />
			</div>

			<div class="field-group">
				<label for="thickness">铜厚 (oz):</label>
				<input type="number" id="thickness" placeholder="输入铜厚" min="0" step="0.5" value="1" />
			</div>

			<div class="field-group" id="resultUnitGroup">
				<label>结果单位:</label>
				<select id="resultUnit">
					<option value="mil">mil</option>
					<option value="mm">mm</option>
				</select>
			</div>

			<div class="result" id="result"></div>
			<div class="note">基于 IPC-2221 标准，仅供参考</div>

			<div class="buttons">
				<button onclick="calculate()">计算</button>
				<button onclick="applyTrackWidth(WInner, WOuter)">应用</button>
				<button class="clear" onclick="clearInputs()">清空</button>
			</div>
		</div>

		<script>
			const TRACK_EVENT_ID = '1';
			let WInner = 0;
			let WOuter = 0;
			let currentMode = 'currentToWidth';

			// IPC-2221 标准常数
			const K_INNER = 0.024;
			const K_OUTER = 0.048;
			const B = 0.44;
			const C = 0.725;
			const MIL_PER_MM = 39.3701;
			const OZ_TO_MIL = 1.378;

			function switchMode(mode) {
				currentMode = mode;
				document.getElementById('modeCurrentToWidth').classList.toggle('active', mode === 'currentToWidth');
				document.getElementById('modeWidthToCurrent').classList.toggle('active', mode === 'widthToCurrent');
				document.getElementById('currentToWidthFields').style.display = mode === 'currentToWidth' ? '' : 'none';
				document.getElementById('widthToCurrentFields').style.display = mode === 'widthToCurrent' ? '' : 'none';
				document.getElementById('resultUnitGroup').style.display = mode === 'currentToWidth' ? '' : 'none';
				document.getElementById('result').innerHTML = '';
			}

			function onWidthUnitChange() {
				// 切换单位时自动转换已输入的值
				const input = document.getElementById('traceWidth');
				const unit = document.getElementById('widthUnit').value;
				const val = parseFloat(input.value);
				if (!isNaN(val) && val > 0) {
					if (unit === 'mm') {
						// 从 mil 转到 mm
						input.value = (val / MIL_PER_MM).toFixed(4);
					} else {
						// 从 mm 转到 mil
						input.value = (val * MIL_PER_MM).toFixed(2);
					}
				}
			}

			// 电流 → 线宽 (IPC-2221)
			// I = k * dT^b * A^c  =>  A = (I / (k * dT^b))^(1/c)
			// A(mil²) = W(mil) * t(oz) * 1.378
			// W(mil) = A / (t * 1.378)
			function currentToWidth(current, tempRise, thicknessOz) {
				const aInner = Math.pow(current / (K_INNER * Math.pow(tempRise, B)), 1 / C);
				const aOuter = Math.pow(current / (K_OUTER * Math.pow(tempRise, B)), 1 / C);
				const wInner = aInner / (thicknessOz * OZ_TO_MIL);
				const wOuter = aOuter / (thicknessOz * OZ_TO_MIL);
				return { wInner, wOuter };
			}

			// 线宽 → 电流 (IPC-2221 反推)
			// I = k * dT^b * A^c
			// A(mil²) = W(mil) * t(oz) * 1.378
			function widthToCurrent(widthMil, tempRise, thicknessOz) {
				const area = widthMil * thicknessOz * OZ_TO_MIL;
				const iInner = K_INNER * Math.pow(tempRise, B) * Math.pow(area, C);
				const iOuter = K_OUTER * Math.pow(tempRise, B) * Math.pow(area, C);
				return { iInner, iOuter };
			}

			function formatWidth(mil, unit) {
				if (unit === 'mm') {
					return (mil / MIL_PER_MM).toFixed(4) + ' mm';
				}
				return mil.toFixed(2) + ' mil';
			}

			function calculate() {
				const tempRise = parseFloat(document.getElementById('temperature').value);
				const thicknessOz = parseFloat(document.getElementById('thickness').value);

				if (isNaN(tempRise) || isNaN(thicknessOz) || tempRise <= 0 || thicknessOz <= 0) {
					alert('请输入有效的温升和铜厚值！');
					return;
				}

				if (currentMode === 'currentToWidth') {
					const current = parseFloat(document.getElementById('current').value);
					if (isNaN(current) || current <= 0) {
						alert('请输入有效的电流值！');
						return;
					}
					const { wInner, wOuter } = currentToWidth(current, tempRise, thicknessOz);
					WInner = wInner;
					WOuter = wOuter;
					const unit = document.getElementById('resultUnit').value;
					document.getElementById('result').innerHTML =
						'内层所需线宽：' + formatWidth(wInner, unit) + '<br>' + '外层所需线宽：' + formatWidth(wOuter, unit);
				} else {
					let widthVal = parseFloat(document.getElementById('traceWidth').value);
					const widthUnit = document.getElementById('widthUnit').value;
					if (isNaN(widthVal) || widthVal <= 0) {
						alert('请输入有效的线宽值！');
						return;
					}
					// 统一转为 mil 计算
					const widthMil = widthUnit === 'mm' ? widthVal * MIL_PER_MM : widthVal;
					const { iInner, iOuter } = widthToCurrent(widthMil, tempRise, thicknessOz);
					// 反推模式下清除线宽缓存
					WInner = widthMil;
					WOuter = widthMil;
					document.getElementById('result').innerHTML =
						'内层最大电流：' + iInner.toFixed(3) + ' A<br>' + '外层最大电流：' + iOuter.toFixed(3) + ' A';
				}
			}

			function clearInputs() {
				document.getElementById('current').value = '';
				document.getElementById('traceWidth').value = '';
				document.getElementById('temperature').value = '10';
				document.getElementById('thickness').value = '1';
				document.getElementById('result').innerHTML = '';
				eda.pcb_Event.removeEventListener(TRACK_EVENT_ID);
			}

			function applyTrackWidth(WInner, WOuter) {
				calculate();
				eda.pcb_Event.addMouseEventListener(
					TRACK_EVENT_ID,
					'selected',
					async (eventType) => {
						const selectedPrimitives = await eda.pcb_SelectControl.getSelectedPrimitives();
						if (selectedPrimitives.length === 1) {
							const track = selectedPrimitives[0];
							if (track['pcbItemPrimitiveType'] === 'Track') {
								const layerId = track['layerId'];
								const globalIndex = track['globalIndex'];
								if (layerId >= 1 && layerId <= 2) {
									eda.pcb_PrimitiveLine.modify(globalIndex, { lineWidth: WOuter });
								} else if (layerId >= 15 && layerId <= 46) {
									eda.pcb_PrimitiveLine.modify(globalIndex, { lineWidth: WInner });
								}
							}
						}
					},
					1,
				);
			}

			// 公式显示切换
			document.getElementById('toggleFormulaButton').addEventListener('click', function () {
				const formula = document.querySelector('.formula');
				const inputs = document.querySelectorAll('.mode-switch, #currentToWidthFields, #widthToCurrentFields, .field-group, .buttons, .note');
				const isVisible = formula.style.display === 'block';

				if (isVisible) {
					formula.style.display = 'none';
					this.textContent = '显示公式';
					inputs.forEach((el) => (el.style.display = ''));
					// 恢复模式对应的显示状态
					switchMode(currentMode);
				} else {
					formula.style.display = 'block';
					this.textContent = '关闭公式';
					inputs.forEach((el) => (el.style.display = 'none'));
				}
			});
		</script>
	</body>
</html>
